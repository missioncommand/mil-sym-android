description = 'MIL-STD-2525 Symbology Renderer Test app'

apply plugin: 'com.android.application'
apply from: "${rootDir}/gradle/android-support.gradle"

android {
    namespace "armyc2.c5isr.renderer.test1"
    // Other configurations
    defaultConfig {
        applicationId "armyc2.c5isr.renderer.test1"
    }

    buildFeatures {
        buildConfig = true
    }

    compileSdkVersion android_compileSdkVersion
    defaultConfig {
        minSdkVersion android_minSdkVersion
        targetSdkVersion android_targetSdkVersion
    }
}

dependencies {

    implementation project(':mil-sym-android-renderer') // Reference the library module
    implementation 'androidx.annotation:annotation:1.9.1'
    implementation 'androidx.core:core-ktx:1.15.0'
    implementation 'com.caverock:androidsvg-aar:1.4'
}

android {
    defaultConfig {
        applicationId "armyc2.c5isr.renderer.test1"
    }
}

